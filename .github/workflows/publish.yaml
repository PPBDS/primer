name: Build and Publish

on:
  push:
    branches: main
  pull_request:
    branches: main

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies for V8
        run: |
          sudo apt-get update
          sudo apt-get install -y libnode-dev libv8-dev

      - name: Install book dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: book
          cache-version: 1

      # The primer.tutorials pkgdown steps that used to run here moved to
      # the PPBDS/primer.tutorials repo (package split, 2026-07); its site
      # now publishes to ppbds.github.io/primer.tutorials/ instead of
      # nesting under the book at /primer/tutorials/.
      - name: Render book
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html
          path: book

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book/docs
          force_orphan: true
