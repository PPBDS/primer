name: Build and Publish

on:
  push:
    branches: main
  pull_request:
    branches: main

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_CONFIG_AUTOLOADER_ENABLED: FALSE

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies for V8
        run: |
          sudo apt-get update
          sudo apt-get install -y libnode-dev libv8-dev

      - name: Install book dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1

      - name: Install tutorial package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: primer.tutorials
          extra-packages: any::pkgdown, local::.
          needs: website
          cache-version: 1

      - name: Render book
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html
          path: .

      - name: Build pkgdown site into docs/tutorials
        run: |
          pkgdown::build_site_github_pages(
            pkg        = ".",
            dest_dir   = "../docs/tutorials",
            new_process = FALSE,
            install     = FALSE
          )
        shell: Rscript {0}
        working-directory: primer.tutorials

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
